<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Registration Portal</title>
    <link rel= "stylesheet" href="style.css">
    </head>
<body>

    <main>
        <h1>Create Your Account</h1>
        <form>
           <div class="form-group">
             <label for="user-name">Full Name</label>
             <input type="text" id="user-name" required placeholder="e.g. jane Doe">
           </div>

           <div class="form-group"
              <label for="user-email">Email Address</label>
              <input type="email" id="user-email" required placeholder="e.g. jane@example.com">
              </div>
              
            <div class="form-group"  
               <label for="user-password">Password</label>
               <input type="password" id="user-password" required minlength="8" placeholder="At least 8 characters">
        </div>

        <button>Create Account</button>
        </form>
        </main>

</body>
</html>
